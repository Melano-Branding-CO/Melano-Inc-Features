name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: v0-melano-inc-features/package-lock.json

      - name: Install app dependencies
        run: npm --prefix "v0-melano-inc-features" ci

      - name: Lint starter app
        run: npm run lint

      - name: Run smoke tests
        run: npm test

      - name: Build starter app
        run: npm run build
